      menu:
      - text: Quick Start
        href: articles/quickstart.html
      - text: Risk Taxonomy
        href: articles/risk-taxonomy.html
      - text: Framework Integration
        href: articles/frameworks.html
    github:
      icon: fab fa-github
      href: https://github.com/gcol33/BORG
      aria-label: GitHub
